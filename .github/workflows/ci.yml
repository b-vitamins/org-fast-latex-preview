name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - "29.4"
          - "30.2"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install TeX and SVG toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y dvisvgm texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra
          kpsewhich preview.sty

      - name: Verify toolchain
        run: |
          command -v emacs
          emacs -Q --batch --eval "(progn (require 'org) (princ (format \"emacs=%s org=%s\n\" emacs-version (org-version nil t))))"
          python3 --version
          make --version
          command -v latex
          latex --version
          command -v dvisvgm
          dvisvgm --version
          kpsewhich preview.sty

      - name: Compile
        run: |
          if ! make compile >compile.log 2>&1; then
            python3 -c 'import pathlib; text = pathlib.Path("compile.log").read_text(encoding="utf-8", errors="replace"); lines = [line.strip() for line in text.splitlines()[1:] if line.strip()]; detail = " | ".join(lines[:3]) if lines else "<no compiler output beyond command line>"; detail = detail.replace("%", "%25").replace("\\r", "%0D").replace("\\n", "%0A"); print(f"::error file=Makefile,line=11,title=make compile failed::{detail}")'
            cat compile.log
            exit 1
          fi

      - name: Test
        run: |
          if ! make test >test.log 2>&1; then
            python3 -c 'import pathlib; text = pathlib.Path("test.log").read_text(encoding="utf-8", errors="replace"); lines = [line.strip() for line in text.splitlines()[1:] if line.strip() and not line.startswith("make: ***")]; detail = " | ".join(lines[-6:]) if lines else "<no test output beyond command line>"; detail = detail.replace("%", "%25").replace("\\r", "%0D").replace("\\n", "%0A"); print(f"::error file=Makefile,line=18,title=make test failed::{detail}")'
            cat test.log
            exit 1
          fi

      - name: Lint checkdoc
        run: make lint-checkdoc

      - name: Lint package
        run: make lint-package
